model:
  scale: 2
  n_resblocks: 8
  n_feats: 32
  res_scale: 0.1

dataset:
  root: dataset_sr
  batch_size: 16
  val_split: 0.8

training:
  epochs: 20
  lr: 0.0001

loss:
  lambda_pixel: 1.0
  lambda_perc: 0.01
  lambda_edge: 0.1

system:
  device: auto
  seed: 42

save:
  path: saved_models/edsr.pth